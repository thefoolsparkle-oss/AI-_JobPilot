<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { width: 340px; padding: 14px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 12px; color: #333; }
  h2 { font-size: 15px; margin: 0 0 6px; color: #1d4ed8; }
  .page-tag { display: inline-block; font-size: 10px; background: #dbeafe; color: #1e40af; padding: 2px 8px; border-radius: 10px; margin-bottom: 8px; }
  .status { padding: 6px 10px; border-radius: 6px; margin-bottom: 10px; font-size: 11px; }
  .status.info { background: #dbeafe; color: #1e40af; }
  .status.ok { background: #dcfce7; color: #166534; }
  .status.err { background: #fee2e2; color: #991b1b; }
  .content-preview { max-height: 100px; overflow-y: auto; background: #f4f4f5; border-radius: 6px; padding: 8px; font-size: 11px; margin-bottom: 10px; white-space: pre-wrap; color: #666; }
  button { width: 100%; padding: 8px; border: none; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; margin-bottom: 6px; }
  button.primary { background: #1d4ed8; color: #fff; }
  button.primary:hover { background: #1e40af; }
  button.primary:disabled { background: #93c5fd; cursor: not-allowed; }
  button.secondary { background: #f4f4f5; color: #333; }
  button.secondary:hover { background: #e4e4e7; }
  .section { margin-top: 8px; }
  .field-row { display: flex; align-items: center; gap: 6px; padding: 4px 6px; background: #f8f9fa; border-radius: 4px; margin-bottom: 3px; font-size: 11px; }
  .field-label { flex: 1; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .field-tag { background: #e5e7eb; color: #6b7280; padding: 1px 5px; border-radius: 3px; font-size: 10px; }
  .field-value { color: #9ca3af; font-size: 10px; }
  .suggestion-box { background: #f0fdf4; border-radius: 6px; padding: 8px; font-size: 11px; max-height: 200px; overflow-y: auto; margin-bottom: 8px; }
</style>
</head>
<body>
<h2>JobPilot</h2>
<div class="page-tag" id="pageType">加载中...</div>
<div id="status" class="status info">正在检测页面类型...</div>
<div id="preview" class="content-preview" style="display:none"></div>

<div id="section-jd" class="section" style="display:none">
  <div id="jd-title" style="font-size:11px;margin-bottom:6px;color:#555"></div>
  <button id="extractBtn" class="primary">提取 JD 并发送到 JobPilot</button>
</div>

<div id="section-form" class="section" style="display:none">
  <div id="form-fields" style="max-height:150px;overflow-y:auto;margin-bottom:8px"></div>
  <button id="assistBtn" class="primary">获取填写建议</button>
</div>

<div id="section-form-result" class="section" style="display:none">
  <div class="suggestion-box" id="form-suggestions"></div>
  <button id="backBtn" class="secondary">返回</button>
</div>

<button id="openBtn" class="secondary">打开 JobPilot</button>
<script src="popup.js"></script>
</body>
</html>
